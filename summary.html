<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IPAK Group — Production Analysis Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0/dist/chartjs-plugin-datalabels.min.js"></script>
<script src="data.js"></script>
<style>
/* ═══════════════════════════════════════════
   ROOT & RESET (PREMIUM BLUE/CYAN THEME)
═══════════════════════════════════════════ */
:root {
    --bg:          #000000; /* Absolute pitch black */
    --bg-panel:    linear-gradient(135deg, rgba(6, 8, 14, 0.92) 0%, rgba(1, 2, 4, 0.98) 100%); /* Deep obsidian glass */
    --border:      rgba(255, 255, 255, 0.04);
    
    /* Neon accents */
    --accent:      #38bdf8; /* Cyan */
    --accent-rgb:  56, 189, 248;
    --blue:        #2563eb;
    --purple:      #8b5cf6;
    --green:       #10b981;
    --amber:       #f59e0b;
    --red:         #ef4444;
    
    --fh: 'Outfit', sans-serif; /* Clean modern Outfit headings */
    --fb: 'Inter', sans-serif;
}

*{box-sizing:border-box;margin:0;padding:0;}

body{
    background: var(--bg);
    color: #f8fafc;
    font-family: var(--fb);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    font-size: 11.5px;
}

/* Premium radial background glow */
body::before {
    content: '';
    position: absolute;
    top: -20%; left: -10%; width: 55%; height: 55%;
    background: radial-gradient(circle, rgba(56, 189, 248, 0.08) 0%, transparent 65%);
    filter: blur(80px);
    z-index: -1;
    pointer-events: none;
}
body::after {
    content: '';
    position: absolute;
    bottom: -20%; right: -10%; width: 55%; height: 55%;
    background: radial-gradient(circle, rgba(139, 92, 246, 0.05) 0%, transparent 65%);
    filter: blur(80px);
    z-index: -1;
    pointer-events: none;
}

/* ═══════════════════════════════════════════
   TOP BAR (STICKY)
═══════════════════════════════════════════ */
.top-bar {
    background: rgba(0, 0, 0, 0.8);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    height: 48px;
    display: flex;
    align-items: center;
}

.top-bar-inner {
    width: 100%;
    padding: 0 18px;
    display: flex;
    align-items: center;
    justify-content: space-between;
}

.plant-tabs { display: flex; align-items: center; gap: 6px; }

.ptab {
    display: flex; align-items: center; gap: 6px;
    padding: 6px 14px; border-radius: 30px; /* Modern pill style tabs */
    border: 1px solid rgba(255, 255, 255, 0.05);
    background: rgba(255, 255, 255, 0.01);
    color: #64748b;
    font-family: var(--fh); font-size: 11px; font-weight: 700;
    cursor: pointer; transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
}
.ptab:hover { background: rgba(255, 255, 255, 0.04); border-color: rgba(255,255,255,0.15); color: #cbd5e1; }
.ptab.active {
    background: linear-gradient(90deg, rgba(56, 189, 248, 0.15) 0%, rgba(37, 99, 235, 0.05) 100%);
    border-color: var(--accent);
    color: var(--accent);
    box-shadow: 0 0 15px rgba(56, 189, 248, 0.12);
}
.ptab-dot { width: 5px; height: 5px; border-radius: 50%; background: currentColor; }

.filters { display: flex; align-items: center; gap: 8px; }
.flabel { font-size: 9px; font-weight: 700; letter-spacing: .08em; color: #475569; text-transform: uppercase; }
.fsel {
    background: #0f172a; border: 1px solid var(--border);
    color: #94a3b8; font-size: 11px; font-family: var(--fb);
    padding: 4px 8px; border-radius: 6px; outline: none; cursor: pointer;
}
.fsel:hover { border-color: var(--accent); }
.fsel option { background: #0f172a; }
.fsep { width: 1px; height: 16px; background: var(--border); }

.live-badge {
    display: flex; align-items: center; gap: 5px;
    padding: 4px 10px; border-radius: 20px;
    background: rgba(16, 185, 129, 0.08); border: 1px solid rgba(16, 185, 129, 0.2);
    font-size: 10px; font-weight: 600; color: var(--green);
}
.ldot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); box-shadow: 0 0 6px var(--green); animation: blink 2s infinite; }
@keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: .3; } }

/* ═══════════════════════════════════════════
   LAYOUT CONTAINER
═══════════════════════════════════════════ */
.page {
    flex: 1;
    min-height: 0;
    display: flex;
    flex-direction: column;
    padding: 8px 16px 12px;
    gap: 8px;
}

/* ═══════════════════════════════════════════
   HEADER PANEL
═══════════════════════════════════════════ */
.dash-header {
    background: linear-gradient(90deg, rgba(4, 6, 12, 0.8) 0%, rgba(1, 2, 4, 0.95) 100%);
    backdrop-filter: blur(20px);
    border: 1.5px solid rgba(71, 85, 105, 0.5); /* Clear, sharp border for header */
    border-radius: 16px; /* Smooth rounded HUD header */
    padding: 10px 20px;
    display: flex; align-items: center; justify-content: space-between;
    flex-shrink: 0;
    box-shadow: 0 12px 40px rgba(0, 0, 0, 0.7);
}
.dh-left { display: flex; align-items: center; gap: 14px; }
.dh-icon {
    width: 44px; height: 44px; border-radius: 10px;
    background: rgba(56, 189, 248, 0.06);
    border: 1px solid var(--border);
    display: grid; place-items: center;
    font-size: 18px; color: var(--accent);
}
.dh-text .dh-sub { font-size: 9px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; color: var(--accent); }
.dh-text h2 { font-family: var(--fh); font-size: 20px; font-weight: 800; color: #fff; letter-spacing: -0.01em; line-height: 1.1; }
.dh-text .dh-period { font-size: 11px; color: #475569; margin-top: 2px; }

.dh-year {
    font-family: var(--fh); font-size: 28px; font-weight: 800;
    color: var(--accent);
    border: 1.5px solid var(--border);
    border-radius: 8px; padding: 2px 14px; line-height: 1.2;
    background: rgba(56, 189, 248, 0.03);
}

.dh-right { display: flex; align-items: center; gap: 20px; }
.dh-stat { display: flex; align-items: center; gap: 6px; font-size: 11px; color: #64748b; }
.dh-stat i { color: var(--accent); }
.dh-stat strong { color: #cbd5e1; }

/* ═══════════════════════════════════════════
   KPI SUMMARY CARDS
═══════════════════════════════════════════ */
.kpi-row {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 8px;
    flex-shrink: 0;
}
.kcard {
    background: linear-gradient(135deg, rgba(10, 12, 20, 0.85) 0%, rgba(2, 3, 5, 0.98) 100%); /* Ultra-dark obsidian HUD card */
    backdrop-filter: blur(20px);
    border: 1.5px solid rgba(71, 85, 105, 0.4); /* Sharply defined card borders */
    border-left: 3.5px solid var(--kaccent); /* Glowing left vertical bar indicator */
    border-radius: 12px;
    padding: 12px 14px;
    display: flex; align-items: center; gap: 12px;
    position: relative;
    overflow: hidden;
    box-shadow: 0 12px 40px rgba(0, 0, 0, 0.75), inset 0 0 10px rgba(255, 255, 255, 0.005), 0 0 15px var(--kaccent-glow);
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}
.kcard:hover {
    border-color: rgba(56, 189, 248, 0.5); /* Glow borders on hover matching accent */
    border-left-color: var(--kaccent);
    transform: translateY(-2px);
    box-shadow: 0 16px 48px rgba(0, 0, 0, 0.85), 0 0 25px var(--kaccent-glow-hover);
}
.kcard-icon {
    width: 38px; height: 38px; border-radius: 8px;
    display: grid; place-items: center; font-size: 16px;
    background: var(--kaccent-glow);
    border: 1px solid rgba(255, 255, 255, 0.1);
    color: var(--kaccent);
    box-shadow: 0 0 8px var(--kaccent-glow);
}
.kcard-body { min-width: 0; position: relative; z-index: 2; }
.kcard-label { font-size: 9.5px; font-weight: 700; letter-spacing: .06em; color: #94a3b8; text-transform: uppercase; }
.kcard-val { font-family: var(--fh); font-size: 21px; font-weight: 800; color: #ffffff; line-height: 1.1; text-shadow: 0 2px 4px rgba(0,0,0,0.4); }
.kcard-sub { font-size: 10.5px; color: #cbd5e1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

/* Right side watermark-like symbol decoration */
.kcard-decor {
    position: absolute;
    right: 14px;
    bottom: -6px;
    font-size: 46px;
    color: var(--kaccent);
    opacity: 0.22; /* High default opacity to make symbol visible every time */
    pointer-events: none;
    transition: all 0.25s ease;
    z-index: 1;
    filter: drop-shadow(0 0 8px var(--kaccent-glow));
}
.kcard:hover .kcard-decor {
    opacity: 0.45; /* Boosted hover opacity */
    transform: scale(1.12) rotate(-6deg);
}

.row-layout {
    flex: 1;
    min-height: 0;
    display: flex;
    flex-direction: column;
    gap: 8px;
}
.top-row {
    height: 52%;
    display: flex;
    gap: 8px;
    min-height: 0;
}
.bottom-row {
    height: 48%; /* Increased height to maximize bottom-row graphs */
    display: flex;
    gap: 8px;
    min-height: 0;
}

.panel {
    background: var(--bg-panel);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    border: 1.5px solid rgba(71, 85, 105, 0.5); /* Clearly visible solid borders for panels */
    border-radius: 16px;
    padding: 14px;
    display: flex;
    flex-direction: column;
    min-height: 0;
    position: relative;
    box-shadow: 0 16px 48px rgba(0, 0, 0, 0.75);
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}
.panel:hover {
    border-color: rgba(56, 189, 248, 0.5); /* Vibrant glowing border on hover */
    box-shadow: 0 16px 48px rgba(56, 189, 248, 0.08), inset 0 0 15px rgba(56, 189, 248, 0.02);
}

.panel-title {
    font-family: var(--fh); font-size: 11px; font-weight: 700;
    letter-spacing: .08em; text-transform: uppercase; color: #64748b;
    margin-bottom: 8px; display: flex; align-items: center; gap: 6px;
    flex-shrink: 0;
}
.panel-title span { color: #94a3b8; }

/* Scrollable Table wraps */
.tbl-wrap {
    flex: 1;
    min-height: 0;
    overflow-y: auto;
}

/* Tables style matching premium design */
.btable {
    width: 100%; border-collapse: collapse; font-size: 10.5px;
}
.btable thead tr {
    background: rgba(255, 255, 255, 0.01);
    position: sticky; top: 0; z-index: 10;
}
.btable th {
    padding: 5px 6px; text-align: left;
    font-size: 8.5px; font-weight: 700; letter-spacing: .06em;
    text-transform: uppercase; color: #475569;
    border-bottom: 1px solid var(--border);
}
.btable td {
    padding: 2px 6px; border-bottom: 1px solid rgba(255, 255, 255, 0.02);
    color: #cbd5e1;
    font-size: 9.5px;
    line-height: 1.0;
}
.btable tr:hover td { background: rgba(56, 189, 248, 0.04); }
.btable .td-main { color: #f1f5f9; font-weight: 600; font-family: var(--fh); }
.btable .td-bright { color: #fff; font-weight: 700; }
.btable .td-good { color: var(--green); font-weight: 700; }
.btable .td-warn { color: var(--amber); font-weight: 700; }
.btable .td-bad { color: var(--red); font-weight: 700; }

/* Chart wrappers */
.chart-wrap {
    flex: 1;
    min-height: 0;
    position: relative;
}

/* ═══════════════════════════════════════════
   SPECIFIC PANEL STYLES
═══════════════════════════════════════════ */
/* Donut Panel Side-by-Side */
.donut-container {
    display: flex; gap: 12px; align-items: center; flex: 1; min-height: 0;
}
.donut-wrap {
    height: 100%; width: 125px; min-width: 125px; flex-shrink: 0;
    position: relative; display: flex; align-items: center; justify-content: center;
}
.donut-legend {
    flex: 1; min-width: 0; overflow-y: auto; max-height: 100%;
}
.legend-item {
    display: flex; align-items: center; gap: 6px; padding: 3px 0;
    border-bottom: 1px solid rgba(255, 255, 255, 0.02);
}
.legend-dot { width: 8px; height: 8px; border-radius: 2px; flex-shrink: 0; }
.legend-label { color: #64748b; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.legend-val { font-weight: 600; color: #cbd5e1; font-family: var(--fh); }
.legend-pct { color: #475569; font-size: 9.5px; min-width: 32px; text-align: right; }

/* Insights Card List */
.insight-list {
    display: flex; flex-direction: column; gap: 4px; flex: 1; min-height: 0; overflow-y: auto;
}
.insight-card {
    background: linear-gradient(90deg, rgba(30, 41, 75, 0.15) 0%, rgba(13, 19, 31, 0.1) 100%);
    border: 1px solid rgba(56, 189, 248, 0.12);
    border-left: 3px solid var(--accent); /* Glowing left accent line */
    border-radius: 5px; padding: 5px 8px;
    box-shadow: 0 3px 6px rgba(0, 0, 0, 0.2);
    transition: all 0.22s ease;
}
.insight-card:hover {
    border-color: rgba(56, 189, 248, 0.35);
    background: linear-gradient(90deg, rgba(30, 41, 75, 0.3) 0%, rgba(13, 19, 31, 0.25) 100%);
    transform: translateX(2px);
}
.insight-card.alert-card {
    border-left-color: var(--red);
    background: linear-gradient(90deg, rgba(239, 68, 68, 0.05) 0%, rgba(13, 19, 31, 0.1) 100%);
    border-color: rgba(239, 68, 68, 0.15);
}
.insight-card.alert-card:hover {
    border-color: rgba(239, 68, 68, 0.3);
    background: linear-gradient(90deg, rgba(239, 68, 68, 0.1) 0%, rgba(13, 19, 31, 0.25) 100%);
}
.insight-head {
    display: flex; align-items: center; gap: 4px;
    font-size: 8px; font-weight: 700; letter-spacing: .04em;
    text-transform: uppercase; color: #94a3b8; margin-bottom: 2px;
}
.insight-head i { color: var(--accent); filter: drop-shadow(0 0 4px rgba(56, 189, 248, 0.5)); }
.insight-card.alert-card .insight-head i { color: var(--red); filter: drop-shadow(0 0 4px rgba(239, 68, 68, 0.5)); }
.insight-card.alert-card .insight-head { color: #cbd5e1; }
.insight-text { font-size: 10px; color: #cbd5e1; line-height: 1.35; }
.insight-text strong { color: #ffffff; font-weight: 600; }

.pview-btn {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 3px 8px; border-radius: 4px;
    border: 1px solid var(--border);
    background: rgba(255, 255, 255, 0.01);
    color: #475569; font-size: 9.5px; font-weight: 700;
    cursor: pointer; transition: all 0.2s;
}
.pview-btn.active {
    background: rgba(56, 189, 248, 0.1);
    border-color: var(--accent);
    color: var(--accent);
}

.metric-sel {
    background: #0f172a; border: 1px solid var(--border);
    color: #64748b; font-size: 10px; font-family: var(--fb);
    padding: 2px 6px; border-radius: 4px; outline: none; cursor: pointer;
}

.no-data { text-align: center; padding: 20px; color: #334155; }
.no-data i { display: block; font-size: 20px; margin-bottom: 4px; }

/* Custom scrollbars */
::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(56, 189, 248, 0.15); border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: rgba(56, 189, 248, 0.3); }
</style>
</head>
<body>

<!-- ══════════════════════════════════════════════
     TOP BAR
══════════════════════════════════════════════ -->
<div class="top-bar">
    <div class="top-bar-inner">
        <!-- Plant Tabs -->
        <div class="plant-tabs" id="plant-tabs"></div>

        <!-- Filters -->
        <div class="filters">
            <span class="flabel">Year</span>
            <select class="fsel" id="yr"></select>
            
            <div class="fsep"></div>
            
            <span class="flabel">Month</span>
            <select class="fsel" id="mo">
                <option value="all">All Months</option>
                <option value="01">January</option>
                <option value="02">February</option>
                <option value="03">March</option>
                <option value="04">April</option>
                <option value="05">May</option>
                <option value="06">June</option>
                <option value="07">July</option>
                <option value="08">August</option>
                <option value="09">September</option>
                <option value="10">October</option>
                <option value="11">November</option>
                <option value="12">December</option>
            </select>
            
            <div class="fsep"></div>
            
            <div class="live-badge">
                <span class="ldot"></span>
                <span id="latest-lbl">Loading…</span>
            </div>
            
            <div class="fsep"></div>
            
            <a href="dashboard_clean.html" class="ptab" style="text-decoration:none;">
                <i class="fa-solid fa-arrow-up-right-from-square"></i> Full Dashboard
            </a>
        </div>
    </div>
</div>

<!-- ══════════════════════════════════════════════
     MAIN DASHBOARD
══════════════════════════════════════════════ -->
<div class="page">

    <!-- HEADER PANEL -->
    <div class="dash-header" id="dash-header">
        <div class="dh-left">
            <div class="dh-icon" id="dh-icon"><i class="fa-solid fa-chart-line"></i></div>
            <div class="dh-text">
                <div class="dh-sub" id="dh-sub">PRODUCTION OVERVIEW</div>
                <h2>PRODUCTION ANALYSIS SUMMARY</h2>
                <div class="dh-period" id="dh-period">Loading data…</div>
            </div>
        </div>
        <div class="dh-year" id="dh-year">—</div>
        <div class="dh-right" id="dh-right"></div>
    </div>

    <!-- KPI CARDS ROW -->
    <div class="kpi-row" id="kpi-row"></div>

    <!-- VIEWPORT-LOCKED ROW LAYOUT -->
    <div class="row-layout">
        
        <!-- TOP ROW (3 Blocks) -->
        <div class="top-row">
            <!-- Monthly Breakdown Chart -->
            <div class="panel" style="flex: 1.15;">
                <div class="panel-title"><i class="fa-solid fa-chart-column"></i> <span>Monthly Breakdown</span></div>
                <div class="chart-wrap"><canvas id="breakdown-chart"></canvas></div>
            </div>

            <!-- Product Share Donut -->
            <div class="panel" style="flex: 0.7;">
                <div class="panel-title">
                    <i class="fa-solid fa-chart-pie"></i>
                    <span>Product Share</span>
                    <div style="margin-left:auto;display:flex;gap:4px;">
                        <button class="pview-btn" id="pview-type" onclick="setPView('type')"><i class="fa-solid fa-layer-group"></i> Types</button>
                        <button class="pview-btn active" id="pview-prod" onclick="setPView('prod')"><i class="fa-solid fa-list-ol"></i> Products</button>
                    </div>
                </div>
                <div class="donut-container">
                    <div class="donut-wrap"><canvas id="donut-chart"></canvas></div>
                    <div class="donut-legend" id="donut-legend"></div>
                </div>
            </div>

            <!-- Monthly Production Trend Bar -->
            <div class="panel" style="flex: 1.15;">
                <div class="panel-title">
                    <i class="fa-solid fa-chart-column"></i>
                    <span>Monthly Production Trend</span>
                    <select class="metric-sel" id="bar-metric" style="margin-left:auto;">
                        <option value="Production">Production</option>
                        <option value="Waste">Waste</option>
                        <option value="Down Time">Down Time</option>
                    </select>
                </div>
                <div class="chart-wrap"><canvas id="bar-chart"></canvas></div>
            </div>
        </div>

        <!-- BOTTOM ROW (4 Blocks) -->
        <div class="bottom-row">
            <!-- Key Insights & Highlights -->
            <div class="panel" style="flex: 0.85;">
                <div class="panel-title"><i class="fa-solid fa-lightbulb"></i> <span>Key Insights & Highlights</span></div>
                <div class="insight-list" id="insight-panel"></div>
            </div>

            <!-- OEE, Waste & Downtime Chart -->
            <div class="panel" style="flex: 0.65;">
                <div class="panel-title"><i class="fa-solid fa-chart-bar"></i> <span>OEE, Waste & Down Time</span></div>
                <div class="chart-wrap"><canvas id="kpi-comparison-chart"></canvas></div>
            </div>

            <!-- Monthly KPI Breakdown (Stacked) -->
            <div class="panel" style="flex: 1.65;">
                <div class="panel-title"><i class="fa-solid fa-chart-bar"></i> <span>KPI Breakdown (Stacked)</span></div>
                <div class="chart-wrap"><canvas id="stacked-kpi-chart"></canvas></div>
            </div>

            <!-- New Fourth Block: Grade Changes -->
            <div class="panel" style="flex: 0.85;">
                <div class="panel-title"><i class="fa-solid fa-arrow-right-arrow-left"></i> <span>Grade Changes</span></div>
                <div class="chart-wrap"><canvas id="quality-trend-chart"></canvas></div>
            </div>
        </div>

    </div>

</div>

<script>
// ═══════════════════════════════════════════════════════
//  PLANT CONFIG
// ═══════════════════════════════════════════════════════
const PLANTS = [
    { id:'PETPAK', label:'PETPAK', icon:'fa-film',           unit:'BOPET Film' },
    { id:'GPAK',   label:'GPAK',   icon:'fa-industry',        unit:'BOPP Film'  },
    { id:'IPAK',   label:'IPAK',   icon:'fa-boxes-stacked',   unit:'BOPP Film'  },
    { id:'CPAK',   label:'CPAK',   icon:'fa-layer-group',     unit:'CPP Film'   },
];

let active = 'PETPAK';
let donutCh=null, barCh=null, stackedCh=null, breakdownCh=null;
let pView = 'prod';

const plant = id => PLANTS.find(p=>p.id===id) || PLANTS[0];

function fmtMonth(s){
    if(!s) return '';
    try{ 
        const d=new Date(s);
        const yrSelect = document.getElementById('yr');
        const selectedYr = yrSelect ? yrSelect.value : 'all';
        if(selectedYr !== 'all'){
            // Only month abbreviation (e.g. "Jan", "Feb")
            return d.toLocaleDateString('en-US',{month:'short'});
        }
        // Month + 2-digit Year if 'All Years' is selected (e.g. "Jan '26")
        return d.toLocaleDateString('en-US',{month:'short', year:'2-digit'});
    }
    catch{ return s; }
}
function toT(kg){ return kg>=1000?(kg/1000).toFixed(1)+'T':kg.toFixed(0)+'Kg'; }
function rawPct(v){ return v===null||v===undefined?null:(v>1?v:v*100); }

function getData(plantId, yr='all', mo='all'){
    if(!dashboardData?.mainData) return [];
    return dashboardData.mainData
        .filter(r=>{
            if(r.Plant!==plantId) return false;
            const d=r.Month||'';
            if(yr!=='all'&&!d.startsWith(yr)) return false;
            if(mo!=='all'&&d.split('-')[1]!==mo) return false;
            return true;
        })
        .sort((a,b)=>(a.Month||'')<(b.Month||'')?-1:1);
}

function avg(rows,key){ const v=rows.map(r=>rawPct(r[key])).filter(x=>x!=null); return v.length?v.reduce((a,b)=>a+b,0)/v.length:null; }
function sum(rows,key){ const v=rows.map(r=>r[key]).filter(x=>x!=null&&!isNaN(x)); return v.length?v.reduce((a,b)=>a+b,0):null; }

// ── Breakdown chart (Prod, OEE & Waste Stacked) ──────────────────────
function renderBreakdown(rows, p){
    if(breakdownCh){ breakdownCh.destroy(); breakdownCh=null; }
    const sorted=[...rows].sort((a,b)=>a.Month<b.Month?-1:1);
    const labels=sorted.map(r=>fmtMonth(r.Month));

    const maxProd=Math.max(...rows.map(r=>r.Production||0));

    // Proportional scaling for visual visibility (so large Production doesn't squash OEE and Waste)
    const prodVals = sorted.map(r => maxProd > 0 ? ((r.Production || 0) / maxProd) * 100 : 0);
    const oeeVals = sorted.map(r => r['OEE %'] ? (r['OEE %'] > 1 ? r['OEE %'] : r['OEE %'] * 100) : 0);
    const wasteValsScaled = sorted.map(r => r['Waste %'] ? (r['Waste %'] > 1 ? r['Waste %'] * 8 : r['Waste %'] * 800) : 0);

    const ctx=document.getElementById('breakdown-chart').getContext('2d');
    
    const breakdownLabels = {
        id: 'breakdownLabels',
        afterDatasetsDraw(chart) {
            const { ctx } = chart;
            chart.data.datasets.forEach((dataset, datasetIndex) => {
                const meta = chart.getDatasetMeta(datasetIndex);
                if (!meta || meta.hidden) return;
                meta.data.forEach((bar, i) => {
                    const val = dataset.data[i];
                    if (val === null || val === undefined || val === 0) return;
                    
                    const height = Math.abs(bar.y - bar.base);
                    if (height < 6) return; 

                    const row = sorted[i];
                    let labelText = '';
                    if (datasetIndex === 0) {
                        labelText = toT(row.Production || 0);
                    } else if (datasetIndex === 1) {
                        const oee = rawPct(row['OEE %']) || 0;
                        labelText = oee.toFixed(0) + '%'; // Shorter text to fit
                    } else {
                        const wp = rawPct(row['Waste %']) || 0;
                        labelText = wp.toFixed(1) + '%';
                    }

                    ctx.save();
                    ctx.font = "bold 8px 'Space Grotesk',sans-serif";
                    ctx.fillStyle = '#ffffff';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.strokeStyle = 'rgba(0,0,0,0.5)';
                    ctx.lineWidth = 2;
                    
                    const centerX = bar.x;
                    const centerY = (bar.y + bar.base) / 2;
                    ctx.strokeText(labelText, centerX, centerY);
                    ctx.fillText(labelText, centerX, centerY);
                    ctx.restore();
                });
            });
        }
    };

    breakdownCh = new Chart(ctx, {
        type: 'bar',
        data: {
            labels: labels,
            datasets: [
                { label: 'Production', data: prodVals, backgroundColor: '#38bdf8', stack: 'bd' },
                { label: 'OEE %', data: oeeVals, backgroundColor: '#10b981', stack: 'bd' },
                { label: 'Waste % (x8)', data: wasteValsScaled, backgroundColor: '#f43f5e', stack: 'bd' }
            ]
        },
        options: {
            responsive: true, maintainAspectRatio: false,
            layout: { padding: { top: 4, bottom: 4, left: 4, right: 4 } },
            plugins: {
                legend: {
                    display: true, position: 'top',
                    labels: { color: '#64748b', font: { size: 7.5 }, boxWidth: 6, boxHeight: 6 }
                },
                datalabels: { display: false },
                tooltip: {
                    backgroundColor: 'rgba(8,8,16,.95)', borderColor: 'rgba(255,255,255,.08)', borderWidth: 1,
                    mode: 'index', intersect: false,
                    callbacks: { 
                        label: c => {
                            const row = sorted[c.dataIndex];
                            if (c.datasetIndex === 0) {
                                return ` Production: ${toT(row.Production||0)}`;
                            } else if (c.datasetIndex === 1) {
                                const oee = rawPct(row['OEE %']) || 0;
                                return ` OEE: ${oee.toFixed(1)}%`;
                            } else {
                                const wp = rawPct(row['Waste %']) || 0;
                                return ` Waste: ${wp.toFixed(2)}%`;
                            }
                        }
                    }
                }
            },
            scales: {
                x: { stacked: true, grid: { color: 'rgba(255,255,255,.01)' }, ticks: { color: '#475569', font: { size: 7.5 } } },
                y: { 
                    stacked: true, 
                    grid: { color: 'rgba(255,255,255,.02)' }, 
                    ticks: { color: '#475569', font: { size: 7.5 } } 
                }
            }
        },
        plugins: [breakdownLabels]
    });
}

// ── Donut chart ──────────────────────────────────────────────────────
function renderDonut(rows, p){
    if(donutCh){ donutCh.destroy(); donutCh=null; }
    const legend=document.getElementById('donut-legend');
    legend.innerHTML='';

    const yr=document.getElementById('yr').value;
    const mo=document.getElementById('mo').value;

    const prodRows=(dashboardData.productData||[]).filter(r=>{
        if(r.Plant!==active) return false;
        const d=r.Month||'';
        if(yr!=='all'&&!d.startsWith(yr)) return false;
        if(mo!=='all'&&d.split('-')[1]!==mo) return false;
        return true;
    });

    if(!prodRows.length){
        legend.innerHTML='<div class="no-data"><i class="fa-solid fa-database"></i>No product data</div>';
        const wrap=document.querySelector('.donut-wrap');
        const ex=wrap.querySelector('.donut-center'); if(ex) ex.remove();
        return;
    }

    let data=[];
    let totalAll=0;

    if(pView==='type'){
        const byType={};
        prodRows.forEach(r=>{ const t=r['Product Type']||'Other'; byType[t]=(byType[t]||0)+(r.Production||0); });
        totalAll=Object.values(byType).reduce((a,b)=>a+b,0);
        data=Object.entries(byType).sort((a,b)=>b[1]-a[1])
            .map(([label,val],i)=>({ label, val, color:PALETTE[i%PALETTE.length], pct:(val/totalAll*100).toFixed(1) }));
    } else {
        const byProd={};
        prodRows.forEach(r=>{ const k=r.Product||'Unknown'; byProd[k]=(byProd[k]||0)+(r.Production||0); });
        totalAll=Object.values(byProd).reduce((a,b)=>a+b,0);
        const sorted=Object.entries(byProd).sort((a,b)=>b[1]-a[1]);
        // Show ALL products (no grouping into 'Other')
        data=sorted.map(([label,val],i)=>({ label, val, color:PALETTE[i%PALETTE.length], pct:(val/totalAll*100).toFixed(1) }));
    }

    const ctx=document.getElementById('donut-chart').getContext('2d');
    donutCh=new Chart(ctx,{
        type:'doughnut',
        data:{
            labels:data.map(d=>d.label),
            datasets:[{
                data:data.map(d=>d.val),
                backgroundColor:data.map(d=>d.color),
                borderColor:'#0d131f',
                borderWidth:2,
            }]
        },
        options:{
            responsive:true, maintainAspectRatio:false,
            cutout:'65%',
            plugins:{
                legend:{ display:false },
                tooltip:{
                    backgroundColor:'rgba(8,8,16,.95)',
                    borderColor:'rgba(255,255,255,.08)',borderWidth:1,
                    callbacks:{ label:c=>` ${toT(c.parsed)} (${(c.parsed/totalAll*100).toFixed(1)}%)` }
                },
                datalabels:{
                    display: ctx => (ctx.dataset.data[ctx.dataIndex]/totalAll) >= 0.05,
                    color:'#ffffff',
                    font:{ family:"'Space Grotesk',sans-serif", size:9, weight:'700' },
                    textStrokeColor:'rgba(0,0,0,0.6)',
                    textStrokeWidth:2,
                    formatter:(value)=> {
                        const pct=(value/totalAll*100);
                        return pct.toFixed(0)+'%';
                    }
                }
            }
        },
        plugins: [ChartDataLabels]
    });

    // Center label
    const wrap=document.querySelector('.donut-wrap');
    const ex=wrap.querySelector('.donut-center'); if(ex) ex.remove();
    const center=document.createElement('div');
    center.className='donut-center';
    center.style.cssText='position:absolute;text-align:center;pointer-events:none;';
    center.innerHTML=`
        <div style="font-size:8px;color:#475569;font-weight:700;letter-spacing:.05em;">TOTAL</div>
        <div style="font-family:var(--fh);font-size:16px;font-weight:800;color:#fff;letter-spacing:-.01em;">${toT(totalAll)}</div>
    `;
    wrap.appendChild(center);

    // Legend
    data.forEach((d)=>{
        const li=document.createElement('div');
        li.className='legend-item';
        li.innerHTML=`
            <span class="legend-dot" style="background:${d.color};"></span>
            <span class="legend-label">${d.label}</span>
            <span class="legend-val">${toT(d.val)}</span>
            <span class="legend-pct">${d.pct}%</span>
        `;
        legend.appendChild(li);
    });
}

function renderStackedKPI(rows, p){
    if(stackedCh){ stackedCh.destroy(); stackedCh=null; }
    const sorted=[...rows].sort((a,b)=>a.Month<b.Month?-1:1);
    const labels=sorted.map(r=>fmtMonth(r.Month));

    const oeeVals = sorted.map(r => r['OEE %'] ? (r['OEE %'] > 1 ? r['OEE %'] : r['OEE %'] * 100) : 0);
    const availVals = sorted.map(r => r['Availability %'] ? (r['Availability %'] > 1 ? r['Availability %'] : r['Availability %'] * 100) : 0);
    const perfVals = sorted.map(r => r['Performance %'] ? (r['Performance %'] > 1 ? r['Performance %'] : r['Performance %'] * 100) : 0);

    const ctx=document.getElementById('stacked-kpi-chart').getContext('2d');
    
    stackedCh = new Chart(ctx, {
        type: 'bar',
        data: {
            labels: labels,
            datasets: [
                { label: 'OEE %', data: oeeVals, backgroundColor: '#f59e0b', stack: 'kpi' },
                { label: 'Availability %', data: availVals, backgroundColor: '#3b82f6', stack: 'kpi' },
                { label: 'Performance %', data: perfVals, backgroundColor: '#a855f7', stack: 'kpi' }
            ]
        },
        options: {
            responsive: true, maintainAspectRatio: false,
            layout: { padding: { top: 4, bottom: 4, left: 4, right: 4 } },
            plugins: {
                legend: {
                    display: true, position: 'top',
                    labels: { color: '#64748b', font: { size: 7.5 }, boxWidth: 6, boxHeight: 6 }
                },
                datalabels: { display: false },
                tooltip: {
                    backgroundColor: 'rgba(8,8,16,.95)', borderColor: 'rgba(255,255,255,.08)', borderWidth: 1,
                    mode: 'index', intersect: false,
                    callbacks: { 
                        label: c => ` ${c.dataset.label}: ${c.parsed.y.toFixed(1)}%`
                    }
                }
            },
            scales: {
                x: { stacked: true, grid: { color: 'rgba(255,255,255,.01)' }, ticks: { color: '#475569', font: { size: 7.5 } } },
                y: { 
                    stacked: true, 
                    grid: { color: 'rgba(255,255,255,.02)' }, 
                    ticks: { color: '#475569', font: { size: 7.5 }, callback: v => v + '%' } 
                }
            }
        },
        plugins: [segmentLabels]
    });
}

// ── Insight panel ────────────────────────────────────────────────────
function renderInsight(rows, p){
    const wrap=document.getElementById('insight-panel');
    wrap.innerHTML='';

    if(!rows.length){
        wrap.innerHTML='<div class="insight-card"><div class="no-data"><i class="fa-solid fa-database"></i>No data</div></div>';
        return;
    }

    // Dynamic calculations for requested highlights
    const bestOEE = [...rows].sort((a,b)=>rawPct(b['OEE %'])-rawPct(a['OEE %']))[0];
    const worstOEE = [...rows].sort((a,b)=>rawPct(a['OEE %'])-rawPct(b['OEE %']))[0];
    const bestProd = [...rows].sort((a,b)=>(b.Production||0)-(a.Production||0))[0];
    const bestWaste = [...rows].sort((a,b)=>rawPct(b['Waste %'])-rawPct(a['Waste %']))[0];

    const insights=[
        { isAlert: false, icon:'fa-gauge-high',        head:'Highest OEE',        text:`Peak OEE in <strong>${fmtMonth(bestOEE?.Month)}</strong> at <strong>${rawPct(bestOEE['OEE %']).toFixed(1)}%</strong>.` },
        { isAlert: true,  icon:'fa-circle-down',        head:'Lowest OEE',         text:`Lowest OEE in <strong>${fmtMonth(worstOEE?.Month)}</strong> at <strong>${rawPct(worstOEE['OEE %']).toFixed(1)}%</strong>.` },
        { isAlert: false, icon:'fa-industry',           head:'Highest Production', text:`Peak production in <strong>${fmtMonth(bestProd?.Month)}</strong> reaching <strong>${toT(bestProd?.Production||0)}</strong>.` },
        { isAlert: true,  icon:'fa-trash-can',          head:'Highest Waste %',    text:`Max waste in <strong>${fmtMonth(bestWaste?.Month)}</strong> at <strong>${rawPct(bestWaste['Waste %']).toFixed(2)}%</strong>.` }
    ];

    insights.forEach(ins=>{
        const d=document.createElement('div');
        d.className = 'insight-card' + (ins.isAlert ? ' alert-card' : '');
        d.innerHTML=`
            <div class="insight-head"><i class="fa-solid ${ins.icon}"></i> ${ins.head}</div>
            <div class="insight-text">${ins.text}</div>
        `;
        wrap.appendChild(d);
    });
}

// ── Latest label ─────────────────────────────────────────────────────
function updateLatest(rows){
    const lbl=document.getElementById('latest-lbl');
    if(!rows.length){ lbl.textContent='No Data'; return; }
    const latest=[...rows].sort((a,b)=>a.Month>b.Month?-1:1)[0];
    lbl.textContent='Latest: '+fmtMonth(latest.Month);
}

// ── Grade Changes Bar Chart (New Fourth Block) ───────────────────────
let qualityCh = null;
function renderQualityTrend(rows, p){
    if(qualityCh){ qualityCh.destroy(); qualityCh=null; }
    const sorted=[...rows].sort((a,b)=>a.Month<b.Month?-1:1);
    const labels=sorted.map(r=>fmtMonth(r.Month));
    
    const values=sorted.map(r=>r['No of Grade Changes']||0);

    const ctx=document.getElementById('quality-trend-chart').getContext('2d');
    const grad=ctx.createLinearGradient(0,0,0,150);
    grad.addColorStop(0,'rgba(168, 85, 247, 0.9)'); // High-contrast solid purple
    grad.addColorStop(1,'rgba(88, 28, 135, 0.85)'); // Solid dark indigo (non-hollow)

    const gradeLabels = {
        id: 'gradeLabels',
        afterDatasetDraw(chart){
            const {ctx, data} = chart;
            const meta = chart.getDatasetMeta(0);
            if (!meta || !meta.data) return;
            meta.data.forEach((bar, i)=>{
                const v = data.datasets[0].data[i];
                if (v === null || v === undefined) return;
                ctx.save();
                ctx.font = "bold 9px 'Space Grotesk',sans-serif";
                ctx.fillStyle = '#ffffff';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'bottom';
                ctx.fillText(v.toFixed(0), bar.x, bar.y - 3);
                ctx.restore();
            });
        }
    };

    qualityCh = new Chart(ctx, {
        type: 'bar',
        data: {
            labels: labels,
            datasets: [{
                label: 'Grade Changes',
                data: values,
                backgroundColor: grad,
                borderColor: '#c084fc', // Bright lavender border
                borderWidth: 1.5,
                borderRadius: 4
            }]
        },
        options: {
            responsive: true, maintainAspectRatio: false,
            layout: { padding: { top: 12 } }, // Give room for top labels
            plugins: {
                legend: { display: false },
                datalabels: { display: false },
                tooltip: {
                    backgroundColor: 'rgba(8,8,16,.95)', borderColor: 'rgba(255,255,255,.08)', borderWidth: 1,
                    callbacks: { label: c => ` Grade Changes: ${c.parsed.y}` }
                }
            },
            scales: {
                x: { grid: { color: 'rgba(255,255,255,.01)' }, ticks: { color: '#475569', font: { size: 7.5 } } },
                y: { 
                    grid: { color: 'rgba(255,255,255,.02)' }, 
                    ticks: { color: '#475569', font: { size: 7.5 }, stepSize: 1 } 
                }
            }
        },
        plugins: [gradeLabels]
    });
}

// ── Master render ─────────────────────────────────────────────────────
function renderAll(){
    const yr=document.getElementById('yr').value;
    const mo=document.getElementById('mo').value;
    const p=plant(active);

    document.querySelectorAll('.ptab').forEach(t=>t.classList.toggle('active',t.getAttribute('data-plant')===active));

    const rows=getData(active, yr, mo);
    
    try { updateLatest(rows); } catch(e) { console.error("Error in updateLatest:", e); }
    try { renderHeader(rows, p, yr); } catch(e) { console.error("Error in renderHeader:", e); }
    try { renderKPICards(rows, p); } catch(e) { console.error("Error in renderKPICards:", e); }
    try { renderBreakdown(rows, p); } catch(e) { console.error("Error in renderBreakdown:", e); }
    try { renderDonut(rows, p); } catch(e) { console.error("Error in renderDonut:", e); }
    try { renderBar(rows, p); } catch(e) { console.error("Error in renderBar:", e); }
    try { renderKPIComparison(rows, p); } catch(e) { console.error("Error in renderKPIComparison:", e); }
    try { renderStackedKPI(rows, p); } catch(e) { console.error("Error in renderStackedKPI:", e); }
    try { renderQualityTrend(rows, p); } catch(e) { console.error("Error in renderQualityTrend:", e); }
    try { renderInsight(rows, p); } catch(e) { console.error("Error in renderInsight:", e); }
}

// ── Init ──────────────────────────────────────────────────────────────
function init(){
    const yrSelect = document.getElementById('yr');
    if (yrSelect && typeof dashboardData !== 'undefined' && dashboardData.mainData) {
        const years = new Set();
        dashboardData.mainData.forEach(r => {
            if (r.Month) {
                const y = r.Month.split('-')[0];
                if (y && y.length === 4) years.add(y);
            }
        });
        const sortedYears = Array.from(years).sort((a, b) => b - a);
        
        yrSelect.innerHTML = '<option value="all">All Years</option>';
        sortedYears.forEach(y => {
            const opt = document.createElement('option');
            opt.value = y;
            opt.textContent = y;
            yrSelect.appendChild(opt);
        });

        if (sortedYears.length > 0) {
            yrSelect.value = sortedYears[0];
        }
    }

    renderTabs();
    renderAll();

    document.getElementById('yr').addEventListener('change', renderAll);
    document.getElementById('mo').addEventListener('change', renderAll);
    document.getElementById('bar-metric').addEventListener('change', ()=>{
        const yr=document.getElementById('yr').value;
        const mo=document.getElementById('mo').value;
        renderBar(getData(active,yr,mo), plant(active));
    });
}

if(typeof dashboardData!=='undefined'){ init(); }
else{ window.addEventListener('load', init); }
</script>
